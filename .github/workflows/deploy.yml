name: name: Deploy ECS Application v2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

- name: Install AWS CLI v2
  run: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    unzip awscliv2.zip
    sudo ./aws/install --update
    aws --version
     
 - name: Configure AWS Credentials (manual)
        run: |
          mkdir -p ~/.aws
          echo "[default]" > ~/.aws/credentials
          echo "aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials

          echo "[default]" > ~/.aws/config
          echo "region=ap-south-1" >> ~/.aws/config

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin 945488515946.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ecs-demo-app \
            .

      - name: Tag Docker Image
        run: |
          docker tag ecs-demo-app:latest \
          945488515946.dkr.ecr.ap-south-1.amazonaws.com/ecs-demo-app:latest

      - name: Push Image to ECR
        run: |
          docker push 945488515946.dkr.ecr.ap-south-1.amazonaws.com/ecs-demo-app:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
          --cluster ecs-demo-cluster \
          --service ecs-demo-service \
          --force-new-deployment
